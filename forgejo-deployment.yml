apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  labels:
    deployment: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
        - name: forgejo
          # Using the specific version from your compose file for stability
          image: codeberg.org/forgejo/forgejo:14
          resources:
            requests:
              memory: "256Mi" # Start by asking for 256 Megabytes
              cpu: "100m" # Ask for 100 millicores (1/10th of a CPU core)
            limits:
              memory: "500Mi" # Hard stop at 1 Gigabyte to protect the rest of the 8GB system
              cpu: "500m" # Max out at half a CPU core
            # ----------------------------------------
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 22
              name: ssh
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
          volumeMounts:
            - name: forgejo-data-volume
              mountPath: /data
            - name: timezone-config
              mountPath: /etc/localtime
              readOnly: true
      volumes:
        - name: forgejo-data-volume
          persistentVolumeClaim:
            claimName: forgejo-pvc
        - name: timezone-config
          # Maps the Pi's timezone to the pod
          hostPath:
            path: /etc/localtime
